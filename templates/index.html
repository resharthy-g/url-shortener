<!DOCTYPE html>
<html>

<head>

<title>URL Shortener</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="navbar">

<div class="nav-title">
URL Shortener
</div>

<div class="nav-links">
<a href="/">Home</a>
<a href="/links">All Links</a>
</div>

</div>


<div class="container">

<h2>Shorten a URL</h2>

<form method="POST">

<input
type="text"
name="url"
placeholder="Enter URL starting with https://"
required>

<button type="submit">
Shorten
</button>

</form>


{% if error %}

<p class="error">{{ error }}</p>

{% endif %}


{% if short_url %}

<div class="result">

<p>Your short URL:</p>

<a href="{{ short_url }}">{{ short_url }}</a>

<br><br>

<button onclick="copyLink()">
Copy Link
</button>

</div>

<script>

function copyLink() {

navigator.clipboard.writeText("{{ short_url }}")

alert("Link copied!")

}

</script>

{% endif %}

</div>

</body>
</html>
